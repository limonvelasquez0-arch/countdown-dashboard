<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Countdown Dashboard</title> 
<link rel="stylesheet" href="./style.css">
</head>

<body>

<button class="sidebar-toggle">☰</button>

<div class="sidebar">
  <h2>Sections</h2>
  <a href="#" data-target="all">All</a>
  <a href="#" data-target="zzz">Zenless Zone Zero</a>
  <a href="#" data-target="hsr">Honkai Star Rail</a>
  <a href="#" data-target="petit">Petit Planet</a>
</div>

<div class="dashboard">

<section id="zzz" class="panel">
<h2>Zenless Zone Zero</h2>
<iframe src="https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00"></iframe>
</section>

<section id="hsr" class="panel">
<h2>Honkai Star Rail</h2>
<iframe src="https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00"></iframe>
</section>

<section id="petit" class="panel">
<h2>Petit Planet</h2>
<iframe src="https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00"></iframe>
</section>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const sidebar = document.querySelector(".sidebar");
  const toggle = document.querySelector(".sidebar-toggle");
  const links = document.querySelectorAll(".sidebar a");
  const panels = document.querySelectorAll(".panel");

  toggle.addEventListener("click", () => {
    sidebar.classList.toggle("open");
  });

  function show(mode) {

    document.body.classList.toggle("all-mode", mode === "all");

    panels.forEach(p => p.classList.add("hide"));

    setTimeout(() => {

      panels.forEach(p => {

        const visible = mode === "all" || p.id === mode;

        p.style.display = visible ? "block" : "none";

        if (visible) {
          requestAnimationFrame(() => {
            p.classList.remove("hide");
            p.classList.add("show");
          });
        }

      });

    }, 160);

    sidebar.classList.remove("open");
  }

  links.forEach(l => {
    l.addEventListener("click", e => {
      e.preventDefault();
      show(l.dataset.target);
    });
  });

  show("all");

});
</script>

</body>
</html>
