<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= DOM ================= */
const dashboard = document.getElementById("dashboard");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= DATA ================= */
const defaultCounts = [
"https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie%20(CZN)",
"https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia%20(HSR)",
"https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta%20Access"
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) items = [...defaultCounts];

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= RENDER ================= */
function render() {

  const cards = Array.from(dashboard.children);

  // 1. FIRST positions (before changes)
  const first = new Map();
  cards.forEach(card => {
    first.set(card.dataset.url, card.getBoundingClientRect());
  });

  const existing = new Map();
  cards.forEach(card => {
    existing.set(card.dataset.url, card);
  });

  const active = new Set(items);

  // ✅ FIXED PART (ONLY CHANGE)
 // 2. MARK removals (DO NOT remove yet)
const toRemove = [];

cards.forEach(card => {
  if (!active.has(card.dataset.url)) {
    card.classList.add("exit");
    toRemove.push(card);
  }
});

// 3. ADD new cards (unchanged behavior)
items.forEach(url => {

  if (existing.has(url)) return;

  const card = document.createElement("div");
  card.className = "count-card enter";
  card.dataset.url = url;
  card.draggable = true;

  const iframe = document.createElement("iframe");
  iframe.src = url;
  iframe.loading = "lazy";

  const del = document.createElement("button");
  del.className = "delete-btn";
  del.innerText = "✕";

  del.onclick = () => {
    items = items.filter(item => item !== url);
    save();
    render();
  };

  card.addEventListener("dragstart", () => card.classList.add("dragging"));
  card.addEventListener("dragend", () => card.classList.remove("dragging"));

  card.appendChild(iframe);
  card.appendChild(del);
  dashboard.appendChild(card);

  requestAnimationFrame(() => {
    card.classList.remove("enter");
  });
});

// 4. 🔥 REORDER ONLY ONCE (CRITICAL)
const fragment = document.createDocumentFragment();

items.forEach(url => {
  const card = dashboard.querySelector(`[data-url="${url}"]`);
  if (card) fragment.appendChild(card);
});

dashboard.appendChild(fragment);

  requestAnimationFrame(() => {

  const allCards = Array.from(dashboard.children);

  const last = new Map();
  allCards.forEach(card => {
    last.set(card.dataset.url, card.getBoundingClientRect());
  });

  allCards.forEach(card => {

    const f = first.get(card.dataset.url);
    const l = last.get(card.dataset.url);

    if (!f || !l) return;

    const dx = f.left - l.left;
    const dy = f.top - l.top;

    if (dx || dy) {

      card.style.transition = "none";
      card.style.transform = `translate(${dx}px, ${dy}px)`;

      // force layout ONCE
      card.offsetHeight;

      requestAnimationFrame(() => {
        card.style.transition = "transform 0.35s ease";
        card.style.transform = "";
      });

      setTimeout(() => {
        card.style.transition = "";
      }, 350);
    }
  });
});

    // ✅ DELAYED REMOVAL (KEY FIX)
    setTimeout(() => {
      toRemove.forEach(card => card.remove());
    }, 250);

  });

}


/* DRAG */
dashboard.addEventListener("dragover", (e) => {
  if (!editMode) return;
  e.preventDefault();

  const dragging = document.querySelector(".dragging");
  const after = getAfterElement(dashboard, e.clientY);

  if (!dragging) return;

  if (after == null) {
    dashboard.appendChild(dragging);
  } else {
    dashboard.insertBefore(dragging, after);
  }
});

function getAfterElement(container, y) {
  const elements = [...container.querySelectorAll(".count-card:not(.dragging)")];

  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* EDIT MODE */
editBtn.onclick = (e) => {
  e.preventDefault();
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
};

/* ADD */
addBtn.onclick = (e) => {
  e.preventDefault();
  countMenu.classList.add("open");
};

closeCount.onclick = () => countMenu.classList.remove("open");

addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push(url);
  save();

  countInput.value = "";
  countMenu.classList.remove("open");

  render();
};

render();

});
</script>

</body>
</html>
