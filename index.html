<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= DOM ================= */
const dashboard = document.getElementById("dashboard");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= DATA ================= */
const defaultCounts = [
  { id: "default_1", url: "https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie%20(CZN)" },
  { id: "default_2", url: "https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia%20(HSR)" },
  { id: "default_3", url: "https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta%20Access" }
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) items = [...defaultCounts];

// Migrate old format (string URLs) to new format (objects with id and url)
items = items.map((item, idx) => {
  if (typeof item === 'string') {
    return { id: `migrated_${Date.now()}_${idx}`, url: item };
  }
  return item;
});

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= RENDER ================= */
function render() {

  const cards = Array.from(dashboard.children);

  // Step 1: Capture positions of existing cards BEFORE any changes - BY CARD ID, not index
  const first = new Map();
  cards.forEach((card) => {
    // Only capture positions for cards that should stay
    if (items.some(item => item.id === card.dataset.cardId)) {
      first.set(card.dataset.cardId, card.getBoundingClientRect());
    }
  });

  const toAnimate = new Set(first.keys());

  // Step 2: Immediately remove cards that are no longer in items
  cards.forEach(card => {
    const cardId = card.dataset.cardId;
    const exists = items.some(item => item.id === cardId);
    
    if (!exists) {
      card.remove();
    }
  });

  // Step 3: Add/reorder cards to match items order
  items.forEach((item, idx) => {
    let card = document.querySelector(`[data-card-id="${item.id}"]`);
    
    if (!card) {
      // Create new card
      card = document.createElement("div");
      card.className = "count-card enter";
      card.dataset.cardId = item.id;
      card.dataset.url = item.url;
      card.draggable = true;

      const iframe = document.createElement("iframe");
      iframe.src = item.url;
      iframe.loading = "lazy";

      const del = document.createElement("button");
      del.className = "delete-btn";
      del.innerText = "✕";

      card.addEventListener("dragstart", () => card.classList.add("dragging"));
      card.addEventListener("dragend", () => card.classList.remove("dragging"));

      const inner = document.createElement("div");
inner.className = "count-card-inner";
inner.appendChild(iframe);

card.appendChild(inner);
      card.appendChild(del);
      dashboard.appendChild(card);

      // Trigger entry animation
      requestAnimationFrame(() => {
        card.classList.remove("enter");
      });
    } else {
      // Reorder card if needed
      if (dashboard.children[idx] !== card) {
        dashboard.insertBefore(card, dashboard.children[idx] || null);
      }
    }
  });

  // Step 4: Animate cards that moved
  requestAnimationFrame(() => {
    const allCards = Array.from(dashboard.children);
    
    const last = new Map();
    allCards.forEach((card) => {
      last.set(card.dataset.cardId, card.getBoundingClientRect());
    });

    allCards.forEach((card) => {
      const cardId = card.dataset.cardId;
      
      if (!toAnimate.has(cardId)) {
        // New card, no animation needed
        return;
      }

      const f = first.get(cardId);
      const l = last.get(cardId);

      if (!f || !l) return;

      const dx = f.left - l.left;
      const dy = f.top - l.top;

      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        card.style.transform = `translate(${dx}px, ${dy}px)`;
        card.style.transition = "none";

        requestAnimationFrame(() => {
          card.style.transition = "transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
          card.style.transform = "translate(0, 0)";
        });
      }
    });
  });

}

/* DRAG */
dashboard.addEventListener("dragover", (e) => {
  if (!editMode) return;
  e.preventDefault();

  const dragging = document.querySelector(".dragging");
  const after = getAfterElement(dashboard, e.clientY);

  if (!dragging) return;

  if (after == null) {
    dashboard.appendChild(dragging);
  } else {
    dashboard.insertBefore(dragging, after);
  }
});

// DELETE via event delegation
dashboard.addEventListener("click", (e) => {
  if (e.target.classList.contains("delete-btn")) {
    e.preventDefault();
    e.stopPropagation();
    const card = e.target.closest(".count-card");
    if (card) {
      const cardId = card.dataset.cardId;
      // Add exit animation class
      card.classList.add("exit");
      // Remove from items and re-render after animation completes
      setTimeout(() => {
        items = items.filter(item => item.id !== cardId);
        save();
        render();
      }, 300);
    }
  }
});

function getAfterElement(container, y) {
  const elements = [...container.querySelectorAll(".count-card:not(.dragging)")];

  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* EDIT MODE */
editBtn.onclick = (e) => {
  e.preventDefault();
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
};

/* ADD */
addBtn.onclick = (e) => {
  e.preventDefault();
  countMenu.classList.add("open");
};

closeCount.onclick = () => countMenu.classList.remove("open");

addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push({ id: `item_${Date.now()}`, url });
  save();

  countInput.value = "";
  countMenu.classList.remove("open");

  render();
};

render();

});
</script>

</body>
</html>
