<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="bg-btn">Background</a>
  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- BACKGROUND MENU -->
<div class="bg-menu" id="bg-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-menu">✕</button>

    <h3>Background Settings</h3>

    <input type="text" id="bg-input" placeholder="Paste image URL...">
    <div class="bg-preview" id="bg-preview"></div>

    <div class="bg-actions">
      <button id="apply-bg">Apply</button>
      <button id="reset-bg">Reset</button>
    </div>

    <div class="theme-options">
      <div class="theme-circle" data-theme="default" data-name="Default"></div>
      <div class="theme-circle" data-theme="midnight" data-name="Midnight"></div>
      <div class="theme-circle" data-theme="violet" data-name="Violet"></div>
      <div class="theme-circle" data-theme="deepblue" data-name="Deep Blue"></div>
      <div class="theme-circle" data-theme="dusk" data-name="Dusk"></div>
      <div class="theme-circle" data-theme="emerald" data-name="Emerald"></div>
    </div>
  </div>
</div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= DOM ================= */
const dashboard = document.getElementById("dashboard");

const bgMenu = document.getElementById("bg-menu");
const bgBtn = document.getElementById("bg-btn");
const bgInput = document.getElementById("bg-input");
const bgPreview = document.getElementById("bg-preview");
const applyBg = document.getElementById("apply-bg");
const resetBg = document.getElementById("reset-bg");
const closeBg = document.getElementById("close-menu");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= THEME FIX (ADDED) ================= */
const themes = {
  default: {
    bg: "#0f0f14",
    accent: "#6366f1",
    animated: false
  },

  midnight: {
    bg: `
      radial-gradient(circle at 20% 30%, #1b2a44, transparent 60%),
      radial-gradient(circle at 80% 70%, #0a1222, transparent 65%),
      radial-gradient(circle at 50% 50%, #121a2e, transparent 70%),
      #05070d
    `,
    accent: "#5b8cff",
    animated: true
  },

  violet: {
    bg: `
      radial-gradient(circle at 25% 25%, #5b3fd6, transparent 60%),
      radial-gradient(circle at 75% 70%, #2a1240, transparent 65%),
      radial-gradient(circle at 50% 50%, #140a22, transparent 75%),
      #07050c
    `,
    accent: "#b89cff",
    animated: true
  },

  deepblue: {
    bg: `
      radial-gradient(circle at 20% 25%, #1f66ff, transparent 60%),
      radial-gradient(circle at 80% 75%, #081a2e, transparent 65%),
      radial-gradient(circle at 50% 50%, #0a1624, transparent 75%),
      #04070d
    `,
    accent: "#4fb6ff",
    animated: true
  },

  dusk: {
    bg: `
      radial-gradient(circle at 25% 25%, #ff4f9a, transparent 60%),
      radial-gradient(circle at 75% 70%, #3a1630, transparent 65%),
      radial-gradient(circle at 50% 50%, #1a0c16, transparent 75%),
      #06040a
    `,
    accent: "#ff7fbf",
    animated: true
  },

  emerald: {
    bg: `
      radial-gradient(circle at 20% 30%, #1fd6a3, transparent 60%),
      radial-gradient(circle at 80% 70%, #0a3a2e, transparent 65%),
      radial-gradient(circle at 50% 50%, #0a1c18, transparent 75%),
      #040a07
    `,
    accent: "#4fffd0",
    animated: true
  }
};

function applyTheme(theme) {
  document.body.classList.remove("animated-bg");

  document.body.style.background = theme.bg;
  document.body.style.backgroundSize = "250% 250%";
  document.body.style.backgroundRepeat = "no-repeat";
  document.body.style.backgroundAttachment = "fixed";

  document.documentElement.style.setProperty("--accent", theme.accent);

  if (theme.animated) {
    requestAnimationFrame(() => {
      document.body.classList.add("animated-bg");
    });
  }

  localStorage.setItem("theme", JSON.stringify(theme));
}

/* ================= DEFAULT DATA ================= */
const defaultCounts = [
"https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie%20(CZN)&font=display&bgimg=https%3A%2F%2Fblog.prydwen.gg%2Fwp-content%2Fuploads%2F2026%2F04%2Fmaxresdefault-2.webp&units=w,d,h,m,s&showtz=1&progress=1&percent=1&start=2026-04-20T00%3A00%3A00-07%3A00&tz=America%2FTijuana",
"https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia%20(HSR)&font=display&bgimg=https%3A%2F%2Fi.redd.it%2Fwith-the-design-reveal-of-evanescia-and-sparxie-it-feels-v0-1cu4wje40ndg1.jpg",
"https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta%20Access"
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) items = defaultCounts.map(url => ({
  id: crypto.randomUUID(),
  url
}));

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= RENDER ================= */
function render() {

  const existingCards = new Map();

  document.querySelectorAll(".count-card").forEach((card) => {
    existingCards.set(card.dataset.id, card);
  });

  const newSet = new Set();

 items.forEach((item) => {

  newSet.add(item.id);

  let card = existingCards.get(item.id);

  if (card) {
    const iframe = card.querySelector("iframe");
    if (iframe && iframe.src !== item.url) {
      iframe.src = item.url;
    }
    return;
  }

  card = document.createElement("div");
  card.className = "count-card enter";
  card.dataset.id = item.id;
  card.draggable = true;

  const iframe = document.createElement("iframe");
  iframe.src = item.url;

  const del = document.createElement("button");
  del.className = "delete-btn";
  del.innerText = "✕";

  del.onclick = () => {
  card.classList.add("exit");

  setTimeout(() => {
    items = items.filter(i => i.id !== item.id);
    save();
    render();
  }, 250);
};

  card.appendChild(iframe);
  card.appendChild(del);
  dashboard.appendChild(card);

  requestAnimationFrame(() => {
    card.classList.remove("enter");
  });
});

  document.querySelectorAll(".count-card").forEach((card) => {
    if (!newSet.has(card.dataset.id)) {
      card.classList.add("exit");
      setTimeout(() => card.remove(), 250);
    }
  });
}

/* ================= THEME CIRCLE FIX (ADDED) ================= */
document.querySelectorAll(".theme-circle").forEach(circle => {
  const themeName = circle.dataset.theme;

  // give preview color so they are not blank
  const preview = {
    default: "#6366f1",
    midnight: "#38bdf8",
    violet: "#a78bfa",
    deepblue: "#60a5fa",
    dusk: "#c084fc",
    emerald: "#34d399"
  };

  circle.style.background = preview[themeName];

  circle.onclick = () => {
    applyTheme(themes[themeName]);
  };
});

/* drag reorder */
dashboard.addEventListener("dragover", (e) => {
  if (!editMode) return;
  e.preventDefault();

  const dragging = document.querySelector(".dragging");
  const after = getAfterElement(dashboard, e.clientY);

  if (after == null) {
    dashboard.appendChild(dragging);
  } else {
    dashboard.insertBefore(dragging, after);
  }
});

function getAfterElement(container, y) {
  const elements = [...container.querySelectorAll(".count-card:not(.dragging)")];

  const result = elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY, element: null });

  return result.element;
}

/* EDIT MODE */
editBtn.onclick = (e) => {
  e.preventDefault();
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
};

/* ADD */
/* ================= ADD ================= */
/* ================= ADD ================= */
addBtn.onclick = (e) => {
  e.preventDefault();
  countMenu.classList.add("open");
};

closeCount.onclick = () => countMenu.classList.remove("open");

addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push({
    id: crypto.randomUUID(),
    url
  });

  save();

  countInput.value = "";
  countMenu.classList.remove("open");

  render(); // ✅ fixed (no undefined function)
};


/* ================= BG ================= */
bgBtn.onclick = (e) => {
  e.preventDefault();
  bgMenu.classList.add("open");
};

closeBg.onclick = () => bgMenu.classList.remove("open");

bgInput.addEventListener("input", () => {
  bgPreview.style.backgroundImage = `url(${bgInput.value})`;
});

applyBg.onclick = () => {
  const url = bgInput.value;

  if (url) {
    document.body.style.background = `url(${url}) center/cover no-repeat fixed`;
    localStorage.setItem("customBg", url);
  }

  bgMenu.classList.remove("open");
};

resetBg.onclick = () => {
  document.body.style.background = "#0f0f14";
  localStorage.removeItem("customBg");
};


/* ================= LOAD ================= */
const savedBg = localStorage.getItem("customBg");
if (savedBg) {
  document.body.style.background = `url(${savedBg}) center/cover no-repeat fixed`;
}

const savedTheme = localStorage.getItem("theme");
if (savedTheme) {
  applyTheme(JSON.parse(savedTheme));
}
/* ================= CLEAN INITIAL LOAD ================= */




/* INITIAL RENDER */
render();
</script>

</body>
</html>
