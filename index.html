<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  background: #0f0f14;
}

.bg-menu {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
}

.bg-menu.open {
  display: flex;
}

.bg-panel {
  background: #111;
  padding: 20px;
  border-radius: 12px;
}

.theme-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin: 6px;
  display: inline-block;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top-buttons">
  <a href="#" id="bg-btn">Background</a>
</div>

<div class="dashboard">
  <iframe src="https://count.live/?date=2026-04-29T01:00:00"></iframe>
</div>

<div class="bg-menu" id="bg-menu">
  <div class="bg-panel">
    <button id="close-menu">✕</button>

    <h3>Background</h3>

    <input id="bg-input" placeholder="Image URL">
    <button id="apply-bg">Apply</button>
    <button id="reset-bg">Reset</button>

    <div>
      <div class="theme-circle" data-theme="default" data-name="Default"></div>
      <div class="theme-circle" data-theme="midnight" data-name="Midnight"></div>
      <div class="theme-circle" data-theme="violet" data-name="Violet"></div>
    </div>
  </div>
</div>

<script>
const menu = document.getElementById("bg-menu");
const btn = document.getElementById("bg-btn");
const closeBtn = document.getElementById("close-menu");
const apply = document.getElementById("apply-bg");
const reset = document.getElementById("reset-bg");
const input = document.getElementById("bg-input");

/* MENU */
btn.onclick = (e) => {
  e.preventDefault();
  menu.classList.add("open");
};

closeBtn.onclick = () => menu.classList.remove("open");

menu.onclick = (e) => {
  if (e.target === menu) menu.classList.remove("open");
};

/* APPLY */
apply.onclick = () => {
  const url = input.value;

  if (url) {
    document.body.style.background = `url(${url}) center/cover no-repeat fixed`;
  }

  menu.classList.remove("open");
};

/* RESET */
reset.onclick = () => {
  document.body.style.background = "#0f0f14";
  menu.classList.remove("open");
};

/* THEMES */
const themes = {
  default: "#0f0f14",
  midnight: "#020617",
  violet: "#1e1b4b"
};

document.querySelectorAll(".theme-circle").forEach(c => {
  const theme = themes[c.dataset.theme];

  c.style.background = theme;
  c.title = c.dataset.name;

  c.onclick = () => {
    document.body.style.background = theme;
  };
});
</script>

</body>
</html>
