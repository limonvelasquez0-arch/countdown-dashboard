<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="bg-btn">Background</a>
  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- BACKGROUND MENU -->
<div class="bg-menu" id="bg-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-menu">✕</button>

    <h3>Background Settings</h3>

    <input type="text" id="bg-input" placeholder="Paste image URL...">
    <div class="bg-preview" id="bg-preview"></div>

    <div class="bg-actions">
      <button id="apply-bg">Apply</button>
      <button id="reset-bg">Reset</button>
    </div>

    <div class="theme-options">
      <div class="theme-circle" data-theme="default" data-name="Default"></div>
      <div class="theme-circle" data-theme="midnight" data-name="Midnight"></div>
      <div class="theme-circle" data-theme="violet" data-name="Violet"></div>
      <div class="theme-circle" data-theme="deepblue" data-name="Deep Blue"></div>
      <div class="theme-circle" data-theme="dusk" data-name="Dusk"></div>
      <div class="theme-circle" data-theme="emerald" data-name="Emerald"></div>
    </div>
  </div>
</div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>
  
<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= THEME SYSTEM ================= */

/* ================= THEMES ================= */
const themes = {
  default: {
    bg: "#0f0f14",
    accent: "#6366f1",
    animated: false
  },

  midnight: {
    bg: `
      radial-gradient(circle at 20% 30%, #1b2a4a 0%, transparent 55%),
      radial-gradient(circle at 80% 70%, #0b1020 0%, transparent 60%),
      linear-gradient(180deg, #070a12, #0b0f1d)
    `,
    accent: "#7aa2ff",
    animated: true
  },

  violet: {
    bg: `
      radial-gradient(circle at 30% 20%, #3b2a5a 0%, transparent 60%),
      radial-gradient(circle at 70% 80%, #1a1428 0%, transparent 65%),
      linear-gradient(180deg, #080611, #120a1f)
    `,
    accent: "#b39df3",
    animated: true
  },

  deepblue: {
    bg: `
      radial-gradient(circle at 25% 25%, #1a3a6b 0%, transparent 60%),
      radial-gradient(circle at 75% 75%, #0a1626 0%, transparent 65%),
      linear-gradient(180deg, #050a12, #0b1a2c)
    `,
    accent: "#6fb6ff",
    animated: true
  },

  dusk: {
    bg: `
      radial-gradient(circle at 30% 30%, #4a2a5e 0%, transparent 60%),
      radial-gradient(circle at 70% 70%, #1b1024 0%, transparent 65%),
      linear-gradient(180deg, #07050c, #120a18)
    `,
    accent: "#c49bff",
    animated: true
  },

  emerald: {
    bg: `
      radial-gradient(circle at 20% 30%, #1f4a3a 0%, transparent 60%),
      radial-gradient(circle at 80% 70%, #0a1f18 0%, transparent 65%),
      linear-gradient(180deg, #050b09, #071612)
    `,
    accent: "#5fd6a6",
    animated: true
  }
};

/* ================= APPLY THEME (FIXED) ================= */
function applyTheme(name) {

  const theme = themes[name];
  if (!theme) return;

  document.body.classList.remove("animated-bg");

  document.body.style.backgroundImage = theme.bg;
  document.body.style.backgroundSize = "300% 300%";
  document.body.style.backgroundAttachment = "fixed";

  document.documentElement.style.setProperty("--accent", theme.accent);

  if (theme.animated) {
    setTimeout(() => {
      document.body.classList.add("animated-bg");
    }, 50);
  }

  localStorage.setItem("theme", name);
}

/* ================= THEME BUTTONS (FIXED) ================= */
document.querySelectorAll(".theme-circle").forEach(circle => {

  const name = circle.dataset.theme;

  const preview = {
    default: "#6366f1",
    midnight: "#7aa2ff",
    violet: "#b39df3",
    deepblue: "#6fb6ff",
    dusk: "#c49bfc",
    emerald: "#5fd6a6"
  };

  circle.style.background = preview[name];

  circle.onclick = () => applyTheme(name);
});

/* ================= LOAD THEME (FIXED) ================= */
const savedTheme = localStorage.getItem("theme");
if (savedTheme && themes[savedTheme]) {
  applyTheme(savedTheme);
}

/* ================= DOM ================= */

const dashboard = document.getElementById("dashboard");

const bgMenu = document.getElementById("bg-menu");
const bgBtn = document.getElementById("bg-btn");
const bgInput = document.getElementById("bg-input");
const bgPreview = document.getElementById("bg-preview");
const applyBg = document.getElementById("apply-bg");
const resetBg = document.getElementById("reset-bg");
const closeBg = document.getElementById("close-menu");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= LOAD THEME ================= */

const savedTheme = localStorage.getItem("theme");
if (savedTheme) applyTheme(savedTheme);

/* ================= DATA ================= */

const defaultCounts = [
"https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie",
"https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia",
"https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta"
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) items = [...defaultCounts];

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= RENDER ================= */

function render() {
  dashboard.innerHTML = "";

  items.forEach((url, index) => {
    const card = document.createElement("div");
    card.className = "count-card";
    card.dataset.index = index;

    const iframe = document.createElement("iframe");
    iframe.src = url;

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.innerText = "✕";

    del.onclick = () => {
      items.splice(index, 1);
      save();
      render();
    };

    card.appendChild(iframe);
    card.appendChild(del);
    dashboard.appendChild(card);
  });
}

/* ================= BUTTONS ================= */

bgBtn.onclick = (e) => {
  e.preventDefault();
  bgMenu.classList.add("open");
};

closeBg.onclick = () => bgMenu.classList.remove("open");

applyBg.onclick = () => {
  const url = bgInput.value.trim();

  if (url) {
    document.body.style.background = `url(${url}) center/cover no-repeat fixed`;
    localStorage.setItem("customBg", url);
  }

  bgMenu.classList.remove("open");
};

resetBg.onclick = () => {
  document.body.style.background = "#0f0f14";
  localStorage.removeItem("customBg");
  bgMenu.classList.remove("open");
};

addBtn.onclick = (e) => {
  e.preventDefault();
  countMenu.classList.add("open");
};

closeCount.onclick = () => countMenu.classList.remove("open");

addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push(url);
  save();
  render();

  countInput.value = "";
  countMenu.classList.remove("open");
};

editBtn.onclick = (e) => {
  e.preventDefault();
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
};

/* ================= LOAD BG ================= */

const savedBg = localStorage.getItem("customBg");
if (savedBg) {
  document.body.style.background = `url(${savedBg}) center/cover no-repeat fixed`;
}

/* ================= INIT ================= */

render();

});
</script>

</body>
</html>
