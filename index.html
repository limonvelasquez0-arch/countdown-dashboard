<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="bg-btn">Background</a>
  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- BACKGROUND MENU -->
<div class="bg-menu" id="bg-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-menu">✕</button>

    <h3>Background Settings</h3>

    <input type="text" id="bg-input" placeholder="Paste image URL...">
    <div class="bg-preview" id="bg-preview"></div>

    <div class="bg-actions">
      <button id="apply-bg">Apply</button>
      <button id="reset-bg">Reset</button>
    </div>

    <div class="theme-options">
      <div class="theme-circle" data-theme="default" data-name="Default"></div>
      <div class="theme-circle" data-theme="midnight" data-name="Midnight"></div>
      <div class="theme-circle" data-theme="violet" data-name="Violet"></div>
      <div class="theme-circle" data-theme="deepblue" data-name="Deep Blue"></div>
      <div class="theme-circle" data-theme="dusk" data-name="Dusk"></div>
      <div class="theme-circle" data-theme="emerald" data-name="Emerald"></div>
    </div>
  </div>
</div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= DOM ================= */
const dashboard = document.getElementById("dashboard");

const bgMenu = document.getElementById("bg-menu");
const bgBtn = document.getElementById("bg-btn");
const bgInput = document.getElementById("bg-input");
const bgPreview = document.getElementById("bg-preview");
const applyBg = document.getElementById("apply-bg");
const resetBg = document.getElementById("reset-bg");
const closeBg = document.getElementById("close-menu");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= THEME ================= */
const themes = {
  default: { bg: "#0f0f14", accent: "#6366f1", animated: false }
};

function applyTheme(theme) {
  document.body.classList.remove("animated-bg");

  document.body.style.background = theme.bg;
  document.body.style.backgroundSize = "250% 250%";
  document.body.style.backgroundRepeat = "no-repeat";
  document.body.style.backgroundAttachment = "fixed";

  document.documentElement.style.setProperty("--accent", theme.accent);

  if (theme.animated) {
    requestAnimationFrame(() => {
      document.body.classList.add("animated-bg");
    });
  }

  localStorage.setItem("theme", JSON.stringify(theme));
}

/* ================= DATA ================= */
const defaultCounts = [
"https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie",
"https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia",
"https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta"
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) {
  items = defaultCounts.map(url => ({
    id: crypto.randomUUID(),
    url
  }));
}

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= FIX: POSITIONS ================= */
function getPositions() {
  const map = new Map();

  document.querySelectorAll(".count-card").forEach(el => {
    map.set(el.dataset.id, el.getBoundingClientRect());
  });

  return map;
}

/* ================= RENDER ================= */
function render() {

  const existingCards = new Map();

  document.querySelectorAll(".count-card").forEach(card => {
    existingCards.set(card.dataset.id, card);
  });

  const newSet = new Set();

  items.forEach(item => {

    newSet.add(item.id);

    let card = existingCards.get(item.id);

    if (card) {
      const iframe = card.querySelector("iframe");
      if (iframe && iframe.src !== item.url) {
        iframe.src = item.url;
      }
      return;
    }

    card = document.createElement("div");
    card.className = "count-card enter";
    card.dataset.id = item.id;
    card.draggable = true;

    const iframe = document.createElement("iframe");
    iframe.src = item.url;

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.innerText = "✕";

    del.onclick = () => {
      card.classList.add("exit");

      setTimeout(() => {
        items = items.filter(i => i.id !== item.id);
        save();
        renderWithAnimation();
      }, 250);
    };

    card.appendChild(iframe);
    card.appendChild(del);
    dashboard.appendChild(card);

    requestAnimationFrame(() => {
      card.classList.remove("enter");
    });
  });

  document.querySelectorAll(".count-card").forEach(card => {
    if (!newSet.has(card.dataset.id)) {
      card.classList.add("exit");
      setTimeout(() => card.remove(), 250);
    }
  });
}

/* ================= FIXED ANIMATION ================= */
function renderWithAnimation() {
  const first = getPositions();

  render();

  requestAnimationFrame(() => {
    document.querySelectorAll(".count-card").forEach(el => {
      const id = el.dataset.id;

      const firstBox = first.get(id);
      if (!firstBox) return;

      const lastBox = el.getBoundingClientRect();

      const dx = firstBox.left - lastBox.left;
      const dy = firstBox.top - lastBox.top;

      el.style.transition = "none";
      el.style.transform = `translate(${dx}px, ${dy}px)`;

      requestAnimationFrame(() => {
        el.style.transition = "transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1)";
        el.style.transform = "";
      });
    });
  });
}

/* ================= ADD ================= */
addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push({
    id: crypto.randomUUID(),
    url
  });

  save();
  countInput.value = "";
  countMenu.classList.remove("open");

  renderWithAnimation();
};

/* ================= INIT ================= */
render();

});
</script>

</body>
</html>
