<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- FIX: small required overrides so themes + animation actually work -->
<style>
  body{
    margin:0;
    min-height:100vh;
    width:100%;
    background: var(--base, #0b0c10);
    background-attachment: fixed;
    transition: background 0.6s ease;
  }

  /* FIX: stops dashboard from “jumping upward / empty bottom feel” */
  .dashboard{
    min-height:100vh;
    align-content:start;
    justify-content:center;
  }

  /* FIX: animation layer actually visible (works only for gradient themes) */
  body.animated-bg{
    animation: softBreath 22s ease-in-out infinite;
  }

  @keyframes softBreath {
    0%   { background-position: 50% 50%; filter: saturate(1) brightness(1); }
    50%  { background-position: 48% 52%; filter: saturate(1.08) brightness(1.05); }
    100% { background-position: 50% 50%; filter: saturate(1) brightness(1); }
  }
</style>
</head>

<body>

<div class="top-buttons">
  <a href="https://github.com/limonvelasquez0-arch/countdown-dashboard" target="_blank" class="top-btn">
    GitHub
  </a>

  <a href="#" class="top-btn" id="bg-btn">Background</a>
  <a href="#" class="top-btn" id="add-btn">Add</a>
  <a href="#" class="top-btn" id="edit-btn">Edit</a>
</div>

<div class="dashboard" id="dashboard"></div>

<!-- BACKGROUND MENU -->
<div class="bg-menu" id="bg-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-menu">✕</button>

    <h3>Background Settings</h3>

    <input type="text" id="bg-input" placeholder="Paste image URL...">
    <div class="bg-preview" id="bg-preview"></div>

    <div class="bg-actions">
      <button id="apply-bg">Apply</button>
      <button id="reset-bg">Reset</button>
    </div>

    <div class="theme-options">
      <div class="theme-circle" data-theme="default" data-name="Default"></div>
      <div class="theme-circle" data-theme="midnight" data-name="Midnight"></div>
      <div class="theme-circle" data-theme="violet" data-name="Violet"></div>
      <div class="theme-circle" data-theme="deepblue" data-name="Deep Blue"></div>
      <div class="theme-circle" data-theme="dusk" data-name="Dusk"></div>
      <div class="theme-circle" data-theme="emerald" data-name="Emerald"></div>
    </div>
  </div>
</div>

<!-- ADD MENU -->
<div class="bg-menu" id="count-menu">
  <div class="bg-panel">
    <button class="close-btn" id="close-count">✕</button>

    <h3>Add Countdown</h3>

    <input type="text" id="count-input" placeholder="Paste count.live URL...">

    <div class="bg-actions">
      <button id="add-count">Add</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= THEMES (FIXED + NOW ACTUALLY DIFFERENT) ================= */

const themes = {
  default: {
    base: "radial-gradient(circle at 20% 30%, #1b1b2a, #0b0c10 60%, #07070c)",
    accent: "#7c7dff",
    animated: false
  },

  midnight: {
    base: "radial-gradient(circle at 30% 20%, #1b2a44, #05070d 60%, #02030a)",
    accent: "#7aa2ff",
    animated: true
  },

  violet: {
    base: "radial-gradient(circle at 30% 30%, #2a1b3d, #07050c 60%, #05040a)",
    accent: "#c2a8ff",
    animated: true
  },

  deepblue: {
    base: "radial-gradient(circle at 25% 25%, #102a4a, #04060a 60%, #02040a)",
    accent: "#6fc2ff",
    animated: true
  },

  dusk: {
    base: "radial-gradient(circle at 40% 30%, #3a1b2a, #05040a 60%, #030308)",
    accent: "#ff9bd1",
    animated: true
  },

  emerald: {
    base: "radial-gradient(circle at 30% 30%, #123a2f, #040807 60%, #020504)",
    accent: "#6fffd1",
    animated: true
  }
};

function applyTheme(name) {
  const t = themes[name];
  if (!t) return;

  // FIX: real background system (no override bugs anymore)
  document.body.style.setProperty("--base", t.base);
  document.documentElement.style.setProperty("--accent", t.accent);

  document.body.style.background = t.base;
  document.body.style.backgroundSize = "200% 200%";
  document.body.style.backgroundAttachment = "fixed";

  localStorage.setItem("theme", name);

  if (t.animated) document.body.classList.add("animated-bg");
  else document.body.classList.remove("animated-bg");
}

/* ================= DOM ================= */

const dashboard = document.getElementById("dashboard");

const bgMenu = document.getElementById("bg-menu");
const bgBtn = document.getElementById("bg-btn");
const bgInput = document.getElementById("bg-input");
const bgPreview = document.getElementById("bg-preview");
const applyBg = document.getElementById("apply-bg");
const resetBg = document.getElementById("reset-bg");
const closeBg = document.getElementById("close-menu");

const addBtn = document.getElementById("add-btn");
const countMenu = document.getElementById("count-menu");
const countInput = document.getElementById("count-input");
const addCount = document.getElementById("add-count");
const closeCount = document.getElementById("close-count");

const editBtn = document.getElementById("edit-btn");

let editMode = false;

/* ================= LOAD THEME ================= */

const savedTheme = localStorage.getItem("theme");
if (savedTheme) applyTheme(savedTheme);

/* ================= FIX: THEME CIRCLES COLORS ================= */

const previewColors = {
  default: "#7c7dff",
  midnight: "#7aa2ff",
  violet: "#c2a8ff",
  deepblue: "#6fc2ff",
  dusk: "#ff9bd1",
  emerald: "#6fffd1"
};

document.querySelectorAll(".theme-circle").forEach(c => {
  const name = c.dataset.theme;

  c.style.background = previewColors[name] || "#fff";

  c.onclick = () => applyTheme(name);
});

/* ================= DATA ================= */

const defaultCounts = [
"https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie",
"https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia",
"https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta"
];

let items = JSON.parse(localStorage.getItem("counts"));
if (!items || items.length === 0) items = [...defaultCounts];

function save() {
  localStorage.setItem("counts", JSON.stringify(items));
}

/* ================= RENDER ================= */

function render() {
  dashboard.innerHTML = "";

  items.forEach((url, index) => {
    const card = document.createElement("div");
    card.className = "count-card";
    card.dataset.index = index;
    card.draggable = true;

    const iframe = document.createElement("iframe");
    iframe.src = url;

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.innerText = "✕";

    del.onclick = () => {
      card.classList.add("exit");

      setTimeout(() => {
        items.splice(index, 1);
        save();
        render();
      }, 200);
    };

    card.appendChild(iframe);
    card.appendChild(del);
    dashboard.appendChild(card);
  });
}

/* ================= BG ================= */

bgBtn.onclick = (e) => {
  e.preventDefault();
  bgMenu.classList.add("open");
};

closeBg.onclick = () => bgMenu.classList.remove("open");

bgInput.addEventListener("input", () => {
  bgPreview.style.backgroundImage = `url(${bgInput.value})`;
});

applyBg.onclick = () => {
  const url = bgInput.value.trim();

  if (url) {
    document.body.style.background = `url(${url}) center/cover no-repeat fixed`;
    localStorage.setItem("customBg", url);
  }

  bgMenu.classList.remove("open");
};

resetBg.onclick = () => {
  document.body.style.background = "";
  localStorage.removeItem("customBg");
  bgMenu.classList.remove("open");
};

/* ================= ADD ================= */

addBtn.onclick = (e) => {
  e.preventDefault();
  countMenu.classList.add("open");
};

closeCount.onclick = () => countMenu.classList.remove("open");

addCount.onclick = () => {
  const url = countInput.value.trim();
  if (!url) return;

  items.push(url);
  save();
  render();

  countInput.value = "";
  countMenu.classList.remove("open");
};

/* ================= EDIT ================= */

editBtn.onclick = (e) => {
  e.preventDefault();
  editMode = !editMode;
  document.body.classList.toggle("edit-mode", editMode);
};

/* ================= LOAD BG ================= */

const savedBg = localStorage.getItem("customBg");
if (savedBg) {
  document.body.style.background = `url(${savedBg}) center/cover no-repeat fixed`;
}

/* ================= INIT ================= */

render();

});
</script>

</body>
</html>
