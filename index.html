<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/x-icon" href="resources/favicon.ico">

</head>

<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">

  <a href="#" onclick="showSection('all')">All</a>
  <a href="#" onclick="showSection('czn')">Chaos Zero Nightmare</a>
  <a href="#" onclick="showSection('hsr')">Honkai Star Rail</a>
  <a href="#" onclick="showSection('pp')">Petit Planet</a>

</div>

<div class="dashboard">

  <div class="card czn">
    <iframe src="https://count.live/?date=2026-04-29T01%3A00%3A00-07%3A00&title=Heidemarie%20(CZN)"></iframe>
  </div>

  <div class="card hsr">
    <iframe src="https://count.live/?date=2026-05-13T15%3A00%3A00-07%3A00&title=Evanescia%20(HSR)"></iframe>
  </div>

  <div class="card pp">
    <iframe src="https://count.live/?date=2026-04-23T18%3A00%3A00-07%3A00&title=Beta%20Access%20(PP)"></iframe>
  </div>

</div>

<script>

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

function showSection(category) {
  const items = document.querySelectorAll(".card");

  // toggle ALL MODE safely
  document.body.classList.toggle("all-view", category === "all");

  items.forEach(el => {

    // IMPORTANT: remove inline display overrides completely
    el.style.removeProperty("display");

    if (category === "all") {
      el.classList.remove("hidden");
    } else {
      el.classList.toggle("hidden", !el.classList.contains(category));
    }

  });

  toggleSidebar();
}

/* default state */
window.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("all-view");
});

</script>

</body>
</html>
